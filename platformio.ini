; PlatformIO Configuration File for 2.8-inch ESP32-S3 Display (Capacitive Touch)
; https://www.lcdwiki.com/2.8inch_ESP32-S3_Display
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

# Automatically configures the USB DFU / OTG ports for direct USB flashing and monitoring
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=1
    
    # TFT_eSPI Configuration via build flags (No need to edit User_Setup.h!)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1          # Reset is connected to CHIP_PU (EN) pin of ESP32-S3
    -DTFT_BL=45           # Backlight pin
    -DTOUCH_CS=-1         # We don't use Touch SPI CS (Touch is capacitive I2C FT6336G)
    -DLOAD_GLCD=1         # Load basic font
    -DSPI_FREQUENCY=40000000

    # LVGL Configuration via build flags
    -DLV_CONF_INCLUDE_SIMPLE=1
    -Iinclude             # Direct access to include folder for lv_conf.h

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.4
    adafruit/Adafruit NeoPixel @ ^1.12.0
